<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News App</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            color: white;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .background img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(50%);
        }

        .container {
            margin-top: 50px;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 3rem;
            font-weight: 600;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        form {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        input {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            border-radius: 5px;
        }

        input::placeholder {
            color: #ddd;
        }

        button {
            background-color: #ff5722;
            border: none;
            border-radius: 5px;
        }

        button:hover {
            background-color: #e64a19;
        }

        .news-card {
            background: white;
            color: #333;
            border: none;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s;
        }

        .news-card:hover {
            transform: scale(1.03);
        }

        .news-card img {
            max-height: 200px;
            object-fit: cover;
        }

        .news-card .card-body {
            padding: 20px;
        }

        .error {
            color: #ffc107;
            text-align: center;
            margin-top: 20px;
            font-weight: bold;
        }

        footer {
            margin-top: 50px;
            text-align: center;
            color: #ccc;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="background">
        <img src="https://img.freepik.com/premium-photo/virtual-set-studio-green-footage-3d-illustration_327072-1251.jpg?ga=GA1.1.1881255205.1729785280&semt=ais_hybrid" alt="News Background">
    </div>

    <div class="container text-center">
        <h1 class="mb-4">Welcome to News App</h1>
        <form id="newsForm" class="mb-4">
            <div class="input-group">
                <input type="text" id="queryInput" class="form-control" placeholder="Search for news (e.g., Tesla)" required>
                <button type="submit" class="btn btn-danger">
                    <i class="fas fa-search"></i> Search
                </button>
            </div>
        </form>
        <div id="newsContainer"></div>
    </div>

    <footer>
        &copy; 2025 News App | Built with <i class="fas fa-heart text-danger"></i> by Akash Singh
    </footer>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const newsForm = document.getElementById('newsForm');
        const newsContainer = document.getElementById('newsContainer');

        newsForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            const query = document.getElementById('queryInput').value;

            if (!query) {
                newsContainer.innerHTML = '<p class="error">Please enter a topic.</p>';
                return;
            }

            const apiKey = '2fe7c89d254146068e66d8be98816f7b';
            const apiUrl = `https://newsapi.org/v2/everything?q=${encodeURIComponent(query)}&from=2025-03-08&to=2025-03-08&sortBy=popularity&apiKey=${apiKey}`;

            try {
                const response = await fetch(apiUrl);

                if (!response.ok) {
                    throw new Error('Unable to fetch news data. Please check the topic or try again later.');
                }

                const data = await response.json();

                if (data.articles.length === 0) {
                    newsContainer.innerHTML = '<p class="error">No news articles found for this topic.</p>';
                    return;
                }

                newsContainer.innerHTML = data.articles.map(article => `
                    <div class="card news-card">
                        <img src="${article.urlToImage || 'https://via.placeholder.com/800x200?text=No+Image'}" class="card-img-top" alt="News Image">
                        <div class="card-body">
                            <h5 class="card-title">${article.title}</h5>
                            <p class="card-text">${article.description || 'No description available.'}</p>
                            <a href="${article.url}" target="_blank" class="btn btn-primary">Read More</a>
                            <p class="card-text mt-2"><small class="text-muted">Published on ${new Date(article.publishedAt).toLocaleString()}</small></p>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                newsContainer.innerHTML = `<p class="error">${error.message}</p>`;
            }
        });
    </script>
</body>
</html>
